        location ${API_PATH_PREFIX}/ {
            # Deferred DNS resolution — required when BACKEND_URL is a k8s service name
            set $backend_url "${BACKEND_URL}";
            proxy_pass $backend_url;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # socket.io (WebSocket). The client connects same-origin at the
        # default /socket.io/ path, which is outside ${API_PATH_PREFIX},
        # so it needs its own proxy block — same upstream + upgrade headers.
        location /socket.io/ {
            set $backend_url "${BACKEND_URL}";
            proxy_pass $backend_url;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
