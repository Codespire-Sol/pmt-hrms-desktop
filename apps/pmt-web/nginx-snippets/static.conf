        # Vite hashed assets — cache forever
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Runtime env injected at container start by docker-entrypoint.sh
        # index.html loads /config/env.js before the main bundle
        location = /config/env.js {
            alias /tmp/config.js;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # SPA fallback — all unmatched paths return index.html for React Router
        location / {
            try_files $uri $uri/ /index.html;
        }
