# electron-builder configuration for PMT-HRMS desktop app.
# Docs: https://www.electron.build/configuration/configuration
#
# NOTE: run `node scripts/prebuild.js` BEFORE electron-builder so that the
# ./resources/{api,pmt-web,hrms-web} folders exist and are populated.

appId: com.codespire.pmthrms
productName: Codespire PMT-HRMS

# Ship the app as plain files (no asar archive). embedded-postgres computes its
# binary path from __dirname; inside an asar that resolves to app.asar/... where
# executables cannot be spawned (ENOENT). Disabling asar makes __dirname a real
# directory (resources/app/...), so postgres.exe/pg_ctl.exe/initdb.exe launch.
asar: false

# Where the packaged installers (.exe / .dmg) are written.
directories:
  output: release
  # buildResources defaults to "build" — that is where icons/entitlements live.
  buildResources: build

# Files included INSIDE the asar archive. Only the Electron runtime lives here.
# The heavy backend + web bundles are shipped as extraResources (below) so they
# stay outside the asar and can be spawned as real files at runtime.
files:
  - electron/**/*
  - package.json

# extraResources are copied verbatim into the app's `resources/` directory
# (e.g. .../PMT-HRMS.app/Contents/Resources/api on mac,
#        .../resources/api on win). The runtime (electron/main.js) reads them
# via process.resourcesPath.
extraResources:
  - from: resources/api
    to: api
    filter:
      - "**/*"
  - from: resources/pmt-web
    to: pmt-web
    filter:
      - "**/*"
  - from: resources/hrms-web
    to: hrms-web
    filter:
      - "**/*"

# embedded-postgres ships prebuilt native Postgres binaries per platform under
# @embedded-postgres/<platform>. Native binaries CANNOT run from inside an asar
# archive, so they must be unpacked to app.asar.unpacked.
asarUnpack:
  - "**/node_modules/@embedded-postgres/**"

# ---------------------------------------------------------------------------
# Windows
# ---------------------------------------------------------------------------
win:
  target:
    - target: nsis
      arch:
        - x64
  # Real multi-size Windows icon generated by `node scripts/make-icons.js`.
  # If build/icon.ico is missing, electron-builder falls back to build/icon.png.
  icon: build/icon.ico
  # Code signing (optional). Provide WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD env
  # vars (see .github/workflows/build-desktop.yml) to enable Authenticode.

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Codespire PMT-HRMS
  # Auto-update support: a per-user (perMachine:false) NSIS install lets
  # electron-updater apply downloaded updates without an elevation prompt.
  # differentialPackage publishes a blockmap so updates download only the delta.
  differentialPackage: true

# ---------------------------------------------------------------------------
# macOS
# ---------------------------------------------------------------------------
mac:
  target:
    - target: dmg
      # arm64 only (Apple Silicon). A "universal" build merges x64+arm64 via
      # @electron/universal, which fails with asar:false + arch-specific native
      # modules (bcrypt, prisma engine). The macos-latest runner is arm64, so
      # its installed native binaries match this target exactly. (Add an x64
      # runner + arch: [x64] later if Intel Mac support is needed.)
      arch:
        - arm64
  # Real .icns generated by `node scripts/make-icons.js`.
  # If build/icon.icns is missing, electron-builder derives one from build/icon.png.
  icon: build/icon.icns
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # NOTE: ad-hoc signing when no paid Developer ID cert is configured is done
  # explicitly in scripts/notarize.js (the afterSign hook), NOT via a
  # `mac.identity: "-"` setting here. That was tried first and confirmed NOT
  # to work: with CI's CSC_IDENTITY_AUTO_DISCOVERY=false, electron-builder
  # skips macOS code signing entirely regardless of `identity`, so the shipped
  # app kept Electron's default placeholder signature with no sealed
  # resources — which macOS treats as broken/damaged. See scripts/notarize.js
  # for the actual fix and the reasoning.

dmg:
  title: PMT-HRMS ${version}

# afterSign hook runs after code signing; it notarizes the mac build when the
# Apple credentials are present (see scripts/notarize.js).
afterSign: scripts/notarize.js

# ---------------------------------------------------------------------------
# Auto-update / publishing
# ---------------------------------------------------------------------------
# electron-updater reads THIS same block (baked into app-update.yml) at runtime
# to discover releases. owner/repo MUST match the GitHub repo that the CI
# workflow publishes releases to.
# NOTE (placeholder): the repo name below is an assumption — confirm the real
# GitHub repo before the first release and update owner/repo if it differs.
publish:
  - provider: github
    owner: Codespire-Sol
    repo: pmt-hrms-desktop
    releaseType: release
