<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codespire PMT-HRMS</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 28px; background: #0f172a; color: #e2e8f0; padding: 32px;
    }
    h1 { margin: 0; font-size: 26px; font-weight: 700; }
    p.sub { margin: 0; color: #94a3b8; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .card {
      width: 240px; padding: 24px; border-radius: 14px; background: #1e293b;
      border: 1px solid #334155; cursor: pointer; text-align: center; transition: .15s;
    }
    .card:hover { border-color: #3b82f6; transform: translateY(-2px); }
    .card h2 { margin: 0 0 6px; font-size: 18px; }
    .card small { color: #94a3b8; }
    .share {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 16px 20px; font-size: 13px; max-width: 460px; width: 100%;
    }
    .share h3 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: #64748b; }
    .link { display: flex; justify-content: space-between; padding: 4px 0; font-family: ui-monospace, monospace; }
    .link a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;">
    <img src="../icon.png" alt="Codespire" style="height:72px;width:auto;" />
    <h1>Codespire PMT-HRMS</h1>
    <p class="sub">Choose an application to open in this window.</p>
  </div>

  <div class="cards">
    <div class="card" onclick="window.desktop.openPmt()">
      <h2>Open PMT</h2>
      <small>Project Management &middot; :3001</small>
    </div>
    <div class="card" onclick="window.desktop.openHrms()">
      <h2>Open HRMS</h2>
      <small>HR Management &middot; :3000</small>
    </div>
  </div>

  <div class="share">
    <h3>Share on your network</h3>
    <div id="links"><em>Detecting LAN address…</em></div>
  </div>

  <script>
    // Populate LAN share links from the main process.
    window.desktop.getShareInfo().then((info) => {
      const host = info.publicHost || 'localhost';
      document.getElementById('links').innerHTML = `
        <div class="link"><span>PMT</span> <a href="http://${host}:${info.pmtPort}">http://${host}:${info.pmtPort}</a></div>
        <div class="link"><span>HRMS</span> <a href="http://${host}:${info.hrmsPort}">http://${host}:${info.hrmsPort}</a></div>
      `;
    });
  </script>
</body>
</html>
